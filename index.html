<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rumus Data Terakhir - Naruto Edition</title>
    <style>
        /* --- BACKGROUND GAMBAR NARUTO BERGERAK (100% FULLSCREEN) --- */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            background-color: #000;
        }

        .naruto-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: url('https://lh3.googleusercontent.com/d/1Xl20Oq47N_AAtQZ76A28_fH_iZ6oU9-L=w1920-h1080-c') no-repeat center center;
            background-size: cover;
            z-index: -2;
            animation: narutoMotion 25s ease-in-out infinite alternate;
        }

        .chakra-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, rgba(255, 102, 0, 0.15) 0%, rgba(0, 0, 0, 0.65) 80%);
            z-index: -1;
            pointer-events: none;
            animation: pulseAura 4s ease-in-out infinite alternate;
        }

        @keyframes narutoMotion {
            0% { transform: scale(1) translate(0, 0); }
            50% { transform: scale(1.08) translate(-1%, 1%); }
            100% { transform: scale(1.03) translate(1%, -1%); }
        }

        @keyframes pulseAura {
            0% { opacity: 0.6; }
            100% { opacity: 0.9; }
        }

        /* --- CONTAINER UTAMA --- */
        .container {
            background: rgba(15, 15, 15, 0.88);
            border: 2px solid #ff6600;
            box-shadow: 0 0 30px rgba(255, 102, 0, 0.6);
            border-radius: 12px;
            padding: 30px;
            width: 90%;
            max-width: 600px;
            color: #fff;
            position: relative;
            z-index: 2;
            backdrop-filter: blur(6px);
        }

        h2 {
            text-align: center;
            color: #ff6600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0;
            margin-bottom: 25px;
            text-shadow: 2px 2px 8px #000;
        }

        /* --- INPUT DATA MENTAH --- */
        .input-section {
            margin-bottom: 25px;
        }

        .input-section label {
            display: block;
            margin-bottom: 10px;
            color: #ff8533;
            font-weight: bold;
            text-shadow: 1px 1px 2px #000;
        }

        .raw-textarea {
            width: 100%;
            height: 150px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #ff6600;
            border-radius: 6px;
            color: #fff;
            padding: 12px;
            font-family: monospace;
            font-size: 13px;
            resize: vertical;
            box-sizing: border-box;
        }

        .raw-textarea:focus {
            border-color: #ffaa66;
            outline: none;
            box-shadow: 0 0 10px rgba(255, 102, 0, 0.5);
        }

        /* --- PANEL TOMBOL & HASIL --- */
        .action-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            background: rgba(0,0,0,0.6);
            padding: 20px;
            border-radius: 8px;
            border: 1px dashed #ff6600;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            width: 100%;
        }

        button {
            flex: 1;
            padding: 12px 0;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn-submit {
            background-color: #ff6600;
            color: #000;
            box-shadow: 0 0 10px rgba(255, 102, 0, 0.4);
        }

        .btn-submit:hover {
            background-color: #ff8533;
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(255, 102, 0, 0.8);
        }

        .btn-reset {
            background-color: #333;
            color: #fff;
            border: 1px solid #555;
        }

        .btn-reset:hover {
            background-color: #cc0000;
            border-color: #cc0000;
            transform: scale(1.02);
        }

        /* --- KOLOM HASIL AKHIR --- */
        .result-box {
            width: 100%;
            text-align: center;
        }

        .result-box label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #ddd;
            font-weight: bold;
        }

        .result-field {
            width: 100%;
            padding: 15px;
            font-size: 26px;
            font-weight: bold;
            text-align: center;
            background: #000;
            border: 2px solid #ff6600;
            color: #00ff00;
            border-radius: 6px;
            box-sizing: border-box;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
        }
    </style>
</head>
<body>

<!-- Efek Latar Belakang Anime Naruto -->
<div class="naruto-bg"></div>
<div class="chakra-overlay"></div>

<div class="container">
    <h2>Rumus Data Terakhir</h2>
    
    <!-- Kotom Tempat Paste Data Mentah -->
    <div class="input-section">
        <label for="raw_data">Paste Data Mentah di Sini:</label>
        <textarea id="raw_data" class="raw-textarea" placeholder="Paste data mutasi bank Anda langsung di sini..."></textarea>
    </div>
    
    <!-- Kontrol Fitur Hitung & Hasil Akhir -->
    <div class="action-panel">
        <div class="btn-group">
            <button class="btn-submit" onclick="prosesDanHitung()">Submit (Hitung)</button>
            <button class="btn-reset" onclick="resetSemua()">Reset</button>
        </div>

        <div class="result-box">
            <label id="label_hasil" for="hasil_akhir">HASIL AKHIR (Saldo Teratas + Nilai Teratas)</label>
            <input type="text" id="hasil_akhir" class="result-field" readonly placeholder="-">
        </div>
    </div>
</div>

<script>
    function prosesDanHitung() {
        let rawInput = document.getElementById('raw_data').value.trim();
        let resultField = document.getElementById('hasil_akhir');
        let labelHasil = document.getElementById('label_hasil');

        if (!rawInput) {
            alert('Silakan masukkan data mentah terlebih dahulu!');
            return;
        }

        let lines = rawInput.split('\n');
        let validRows = [];

        lines.forEach(line => {
            // Lewati baris kosong atau baris teks judul kolom
            if (line.trim() === '' || line.toLowerCase().includes('bank') || line.toLowerCase().includes('no. akun')) {
                return;
            }

            // Pisahkan kolom menggunakan tab (Excel) atau spasi ganda
            let columns = line.split(/\t| {2,}/);
            if (columns.length >= 5) {
                validRows.push(columns);
            }
        });

        if (validRows.length < 1) {
            alert('Format data tidak valid atau kosong!');
            return;
        }

        // AMBIL BARIS TERATAS (Data Paling Baru / Kronologis Terakhir)
        let barisTeratas = validRows[0]; 

        let noTeratas = barisTeratas[0] ? barisTeratas[0].trim() : '1';
        let nilaiTeratasVal = parseFloat(barisTeratas[3].replace(/,/g, '')) || 0;
        let saldoTeratasVal = parseFloat(barisTeratas[4].replace(/,/g, '')) || 0;

        // EKSEKUSI RUMUS MUTASI: Saldo Teratas + Nilai Teratas
        let total = saldoTeratasVal + nilaiTeratasVal;
        
        // Tampilkan hasil akhir ke layar
        labelHasil.innerText = `HASIL AKHIR (Saldo No.${noTeratas} + Nilai No.${noTeratas})`;
        resultField.value = total.toLocaleString('en-US');
    }

    function resetSemua() {
        document.getElementById('raw_data').value = '';
        document.getElementById('hasil_akhir').value = '';
        document.getElementById('label_hasil').innerText = 'HASIL AKHIR (Saldo Teratas + Nilai Teratas)';
    }
</script>

</body>
</html>
