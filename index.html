<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rumus 10data terakhir - Naruto Edition</title>
    <style>
        /* --- BACKGROUND GAMBAR NARUTO BERGERAK (100% FULLSCREEN) --- */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            background-color: #000;
        }

        /* Lapisan Gambar Naruto Utama dengan Efek Bergerak Lambat (Ken Burns Effect) */
        .naruto-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* Menggunakan gambar pertarungan ikonik Naruto vs Sasuke */
            background: url('https://lh3.googleusercontent.com/d/1Xl20Oq47N_AAtQZ76A28_fH_iZ6oU9-L=w1920-h1080-c') no-repeat center center;
            background-size: cover;
            z-index: -2;
            animation: narutoMotion 25s ease-in-out infinite alternate;
        }

        /* Lapisan Efek Aura Chakra & Awan Hitam Berasap di Atas Gambar */
        .chakra-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, rgba(255, 102, 0, 0.15) 0%, rgba(0, 0, 0, 0.65) 80%);
            z-index: -1;
            pointer-events: none;
            animation: pulseAura 4s ease-in-out infinite alternate;
        }

        /* Animasi Pergerakan Gambar Background */
        @keyframes narutoMotion {
            0% { transform: scale(1) translate(0, 0); }
            50% { transform: scale(1.08) translate(-1%, 1%); }
            100% { transform: scale(1.03) translate(1%, -1%); }
        }

        /* Animasi Denyut Chakra Oranye */
        @keyframes pulseAura {
            0% { opacity: 0.6; }
            100% { opacity: 0.9; }
        }

        /* --- CONTAINER UTAMA --- */
        .container {
            background: rgba(15, 15, 15, 0.88); /* Transparan gelap agar background kelihatan */
            border: 2px solid #ff6600; /* Warna Oranye Khas Naruto */
            box-shadow: 0 0 30px rgba(255, 102, 0, 0.6);
            border-radius: 12px;
            padding: 25px;
            width: 90%;
            max-width: 1100px;
            color: #fff;
            position: relative;
            z-index: 2;
            backdrop-filter: blur(6px); /* Efek kaca buram */
        }

        h2 {
            text-align: center;
            color: #ff6600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0;
            text-shadow: 2px 2px 8px #000;
        }

        /* --- INPUT DATA MENTAH --- */
        .input-section {
            margin-bottom: 20px;
        }

        .input-section label {
            display: block;
            margin-bottom: 8px;
            color: #ff8533;
            font-weight: bold;
            text-shadow: 1px 1px 2px #000;
        }

        .raw-textarea {
            width: 100%;
            height: 90px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #ff6600;
            border-radius: 6px;
            color: #fff;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            resize: vertical;
            box-sizing: border-box;
        }

        .raw-textarea:focus {
            border-color: #ffaa66;
            outline: none;
            box-shadow: 0 0 10px rgba(255, 102, 0, 0.5);
        }

        /* --- RESPONSIVE TABLE --- */
        .table-container {
            overflow-x: auto;
            margin-bottom: 20px;
            border-radius: 6px;
            border: 1px solid #444;
            min-height: 120px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            text-align: left;
            background: rgba(0, 0, 0, 0.75);
        }

        th, td {
            padding: 12px 10px;
            border-bottom: 1px solid #333;
            white-space: nowrap;
        }

        th {
            background-color: #ff6600;
            color: black;
            font-weight: bold;
            text-transform: uppercase;
        }

        .empty-row {
            text-align: center;
            color: #aaa;
            font-style: italic;
        }

        .highlight-orange {
            background-color: rgba(255, 102, 0, 0.35) !important;
            font-weight: bold;
        }

        .highlight-blue {
            background-color: rgba(0, 153, 255, 0.35) !important;
            font-weight: bold;
        }

        /* --- PANEL TOMBOL --- */
        .action-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            background: rgba(0,0,0,0.6);
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed #ff6600;
        }

        .btn-group {
            display: flex;
            gap: 15px;
        }

        button {
            padding: 12px 25px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn-submit {
            background-color: #ff6600;
            color: #000;
            box-shadow: 0 0 10px rgba(255, 102, 0, 0.4);
        }

        .btn-submit:hover {
            background-color: #ff8533;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 102, 0, 0.8);
        }

        .btn-reset {
            background-color: #333;
            color: #fff;
            border: 1px solid #555;
        }

        .btn-reset:hover {
            background-color: #cc0000;
            border-color: #cc0000;
            transform: scale(1.05);
        }

        /* --- KOLOM HASIL AKHIR --- */
        .result-box {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .result-box label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #ddd;
            font-weight: bold;
        }

        .result-field {
            width: 100%;
            padding: 15px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            background: #000;
            border: 2px solid #ff6600;
            color: #00ff00; /* Hijau menyala ala sistem kasir/mesin */
            border-radius: 6px;
            box-sizing: border-box;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
        }
    </style>
</head>
<body>

<!-- Lapisan Background Gambar Bergerak -->
<div class="naruto-bg"></div>
<div class="chakra-overlay"></div>

<div class="container">
    <h2>Rumus 10data terakhir</h2>
    
    <!-- Kolom Kosong untuk Paste Mentahan -->
    <div class="input-section">
        <label for="raw_data">Paste Data Mentah di Sini (Sertakan Baris Judul Kolom Jika Ada):</label>
        <textarea id="raw_data" class="raw-textarea" placeholder="Contoh masukan:&#10;1  dana  087774836663  34,500  232,000 ...&#10;2  dana  085945010346  100,000  224,700 ..."></textarea>
    </div>
    
    <!-- Kolom Tabel yang Awalnya Kosong -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>No</th>
                    <th>Bank</th>
                    <th>No. Akun Bank</th>
                    <th>Nilai</th>
                    <th>Saldo</th>
                    <th>Tanggal</th>
                    <th>Tanggal Tarik Bank</th>
                    <th>Informasi</th>
                    <th>User</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="table_body">
                <tr>
                    <td colspan="10" class="empty-row">Belum ada data. Silakan paste data mentah di atas lalu klik Submit.</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Panel Tombol & Hasil -->
    <div class="action-panel">
        <div class="btn-group">
            <button class="btn-submit" onclick="prosesDanHitung()">Submit (Hitung)</button>
            <button class="btn-reset" onclick="resetSemua()">Reset</button>
        </div>

        <div class="result-box">
            <label for="hasil_akhir">HASIL AKHIR (Saldo No.4 + Nilai No.3)</label>
            <input type="text" id="hasil_akhir" class="result-field" readonly placeholder="-">
        </div>
    </div>
</div>

<script>
    function prosesDanHitung() {
        let rawInput = document.getElementById('raw_data').value.trim();
        let tableBody = document.getElementById('table_body');
        let resultField = document.getElementById('hasil_akhir');

        if (!rawInput) {
            alert('Silakan masukkan data mentah terlebih dahulu!');
            return;
        }

        let lines = rawInput.split('\n');
        let htmlRows = '';
        let validRows = [];

        lines.forEach(line => {
            if (line.trim() === '' || line.toLowerCase().includes('bank') || line.toLowerCase().includes('no. akun')) {
                return;
            }

            // Memisahkan kolom dengan TAB atau spasi ganda
            let columns = line.split(/\t| {2,}/);
            if (columns.length >= 5) {
                validRows.push(columns);
            }
        });

        if (validRows.length === 0) {
            alert('Format data tidak dikenali. Pastikan kolom terpisah dengan TAB atau spasi ganda.');
            return;
        }

        let nilai3 = 0;
        let saldo4 = 0;

        validRows.forEach(row => {
            let no = row[0] ? row[0].trim() : '';
            let bank = row[1] ? row[1].trim() : '';
            let noAkun = row[2] ? row[2].trim() : '';
            let nilai = row[3] ? row[3].trim() : '0';
            let saldo = row[4] ? row[4].trim() : '0';
            let tgl = row[5] ? row[5].trim() : '';
            let tglTarik = row[6] ? row[6].trim() : '';
            let info = row[7] ? row[7].trim() : '';
            let user = row[8] ? row[8].trim() : '';
            let status = row[9] ? row[9].trim() : '';

            let rowClass = '';
            
            // Mencari baris No 3 dan No 4 untuk rumus
            if (no === '3') {
                rowClass = 'class="highlight-orange"';
                nilai3 = parseFloat(nilai.replace(/,/g, '')) || 0;
            } else if (no === '4') {
                rowClass = 'class="highlight-blue"';
                saldo4 = parseFloat(saldo.replace(/,/g, '')) || 0;
            }

            htmlRows += `<tr ${rowClass}>
                <td>${no}</td>
                <td>${bank}</td>
                <td>${noAkun}</td>
                <td>${nilai}</td>
                <td>${saldo}</td>
                <td>${tgl}</td>
                <td>${tglTarik}</td>
                <td>${info}</td>
                <td>${user}</td>
                <td>${status}</td>
            </tr>`;
        });

        tableBody.innerHTML = htmlRows;

        // Eksekusi rumus
        let total = saldo4 + nilai3;
        
        if (nilai3 > 0 || saldo4 > 0) {
            resultField.value = total.toLocaleString('en-US');
        } else {
            resultField.value = 'Data No.3 / No.4 Tidak Ditemukan';
        }
    }

    function resetSemua() {
        document.getElementById('raw_data').value = '';
        document.getElementById('hasil_akhir').value = '';
        document.getElementById('table_body').innerHTML = `
            <tr>
                <td colspan="10" class="empty-row">Belum ada data. Silakan paste data mentah di atas lalu klik Submit.</td>
            </tr>
        `;
    }
</script>

</body>
</html>
